<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Burger House</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:25px;
text-align:center;
font-size:35px;
font-weight:bold;
color:#ffb300;
}

.hero{
height:320px;
background:url("https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=1500&q=80") center/cover;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
text-shadow:0 0 15px black;
}

.container{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;

padding:30px;

}

.card{

background:#1c1c1c;

border-radius:18px;

overflow:hidden;

transition:.3s;

}

.card:hover{

transform:scale(1.03);

}

.card img{

width:100%;
height:220px;
object-fit:cover;

}

.info{

padding:18px;

}

.price{

color:#ffb300;
font-size:24px;
font-weight:bold;

margin-top:8px;

}

button{

margin-top:18px;

width:100%;

padding:15px;

background:#ffb300;

border:none;

font-size:18px;

font-weight:bold;

border-radius:10px;

cursor:pointer;

}

button:hover{

background:#ffc933;

}

footer{

padding:40px;

text-align:center;

color:#999;

}

</style>

</head>

<body>

<header>🍔 BURGER HOUSE</header>

<div class="hero">

Najlepsze Burgery w Mieście

</div>

<div class="container">

<script>

const burgers=[

["Classic Burger","Wołowina, cheddar, sałata, pomidor, sos firmowy","29.99"],

["BBQ Bacon","Wołowina, bekon, cheddar, cebulka, BBQ","34.99"],

["Double Cheese","2x wołowina, 2x cheddar, sos","37.99"],

["Texas Smoke","Wołowina, bekon, cebula prażona","38.99"],

["Italian Burger","Mozzarella, rukola, pesto","35.99"],

["Truffle Burger","Trufla, cheddar, wołowina premium","39.99"],

["Chicken Crispy","Kurczak crispy, sałata, majonez","31.99"],

["Jalapeno Hot","Wołowina, jalapeno, chili","35.99"],

["Veggie Deluxe","Kotlet roślinny, warzywa","29.99"],

["Monster XXL","3x wołowina, bekon, cheddar","44.99"]

];

const img="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80";

burgers.forEach(b=>{

document.write(`

<div class="card">

<img src="${img}">

<div class="info">

<h2>${b[0]}</h2>

<p>${b[1]}</p>

<div class="price">${b[2]} zł</div>

<button>Zamów</button>

</div>

</div>

`);

});

</script>

</div>

<footer>

Burger House © 2026

</footer>

</body>
</html>
